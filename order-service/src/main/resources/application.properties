spring.application.name=createOrderRequest-service
server.port=${APP_PORT:8082}

management.endpoints.web.exposure.include=health, info
management.info.git.mode=full

orders.createOrderRequest-event-exchange=orders-exchange
orders.new-orders-queue=new-orders
orders.delivered-orders-queue=delivered-orders
orders.cancelled-orders-queue=cancelled-orders
orders.error-orders-queue=error-orders

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:25432/order_db}
spring.datasource.username=${DB_USER:sujay}
spring.datasource.password=${DB_PWD:password}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PWD:guest}

